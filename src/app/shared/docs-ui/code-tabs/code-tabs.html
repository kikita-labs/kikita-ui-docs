<div class="code-tabs">
  <div class="code-tabs__toolbar">
    @if (hasMultipleTabs()) {
      <kui-segmented
        class="code-tabs__segments"
        size="xs"
        [selected]="selectedValue()"
        [attr.aria-label]="label()"
        (selectedChange)="selectTabValue($event)"
      >
        @for (tab of tabs(); track tab.label; let index = $index) {
          <button
            #tabButton
            kuiSegment
            [value]="tab.label"
            [id]="tabId(index)"
            [attr.aria-controls]="panelId()"
            (keydown)="selectTabFromKeyboard($event, index)"
          >
            {{ tab.label }}
          </button>
        }
      </kui-segmented>
    } @else {
      <span class="code-tabs__filename">{{ headerLabel() }}</span>
    }

    <button
      kuiIconButton
      class="code-tabs__copy"
      type="button"
      size="xs"
      shape="outline"
      [attr.aria-label]="'Copy ' + headerLabel()"
      (click)="copySelectedCode()"
    >
      <kui-icon name="copy" size="13px" />
    </button>
  </div>

  @if (selectedTab(); as tab) {
    <div
      class="code-tabs__panel"
      role="tabpanel"
      tabindex="0"
      [id]="panelId()"
      [attr.aria-labelledby]="hasMultipleTabs() ? tabId(selectedIndex()) : null"
      [attr.aria-label]="hasMultipleTabs() ? null : 'Source: ' + headerLabel()"
      [attr.aria-busy]="isHighlighting()"
    >
      @if (highlightedCode(); as html) {
        <div class="code-tabs__highlight" [innerHTML]="html"></div>
      } @else {
        <pre
          class="code-tabs__fallback"
        ><code [attr.data-language]="tab.language">{{ tab.code }}</code></pre>
      }
    </div>
  }
</div>
