<section class="doc-section" [attr.aria-labelledby]="headingId()">
  <header class="doc-section__header">
    <div class="doc-section__heading-row">
      <div class="doc-section__heading-group">
        <h2 class="doc-section__title" [id]="headingId()">
          <a
            class="doc-section__heading-link"
            [href]="headingHref()"
            (click)="scrollToHeading($event)"
            >{{ heading() }}</a
          >
        </h2>

        <button
          kuiIconButton
          class="doc-section__copy"
          type="button"
          shape="ghost"
          size="sm"
          [attr.aria-label]="'Copy link to ' + heading()"
          (click)="copyHeadingLink()"
        >
          <kui-icon name="link" size="16px" />
        </button>
      </div>

      <div class="doc-section__actions">
        <ng-content select="[docSectionActions]" />
      </div>
    </div>

    <span class="doc-section__copy-status" aria-live="polite">
      @if (copied()) {
        Link copied
      }
    </span>

    @if (description(); as sectionDescription) {
      <p class="doc-section__description">{{ sectionDescription }}</p>
    }
  </header>

  <div class="doc-section__body">
    <ng-content />
  </div>
</section>
