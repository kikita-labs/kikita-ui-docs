<kui-empty-state
  class="draft-state"
  context="no-data"
  size="lg"
  [heading]="stateTitle()"
  [description]="description()"
>
  <kui-icon kuiEmptyStateIcon name="file-text" size="34px" />

  <div kuiEmptyStateActions class="draft-state__actions">
    <a kuiButton shape="outline" [href]="links.githubRepository" target="_blank" rel="noreferrer">
      View on GitHub
    </a>
    <a kuiButton shape="ghost" [href]="links.githubIssues" target="_blank" rel="noreferrer">
      Get notified
    </a>
  </div>
</kui-empty-state>
