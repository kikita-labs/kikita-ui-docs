<div class="api-playground-viewport">
  <div class="api-playground-viewport__toolbar">
    <kui-segmented [selected]="activePreset()" (selectedChange)="setViewportPreset($event)">
      @for (preset of viewportPresets; track preset.key) {
        <button kuiSegment type="button" [value]="preset.key">
          {{ preset.label }}
        </button>
      }
    </kui-segmented>
    <div class="api-playground-viewport__actions">
      <kui-field class="api-playground-viewport__width-field">
        <div class="kui-input-group">
          <input
            #previewWidthInput
            kuiInput
            type="number"
            inputmode="numeric"
            aria-label="Preview width"
            [min]="320"
            [max]="maxPreviewWidth()"
            [value]="previewWidthValue()"
            (input)="setPreviewWidth(previewWidthInput.value)"
          />
          <span kuiFieldAffix>px</span>
        </div>
      </kui-field>

      <button
        class="api-playground-viewport__theme-toggle"
        kuiIconButton
        type="button"
        shape="outline"
        [attr.aria-label]="previewThemeToggleLabel()"
        [attr.aria-pressed]="previewIsDark()"
        (click)="togglePreviewTheme()"
      >
        <kui-icon [name]="previewIsDark() ? 'moon' : 'sun'" size="15px" />
      </button>
    </div>
  </div>

  <div class="api-playground-viewport__theme-root" [attr.data-kui-theme]="previewTheme()">
    <section
      #stage
      kuiCard
      class="api-playground-viewport__stage"
      appearance="surface"
      size="lg"
      tabindex="0"
      [attr.aria-label]="previewLabel()"
    >
      <div class="api-playground-viewport__resizable" [style.inline-size.px]="previewWidth()">
        <ng-content />
        <div
          class="api-playground-viewport__resize-handle"
          role="separator"
          tabindex="0"
          aria-orientation="vertical"
          aria-label="Resize preview width"
          [attr.aria-valuemin]="320"
          [attr.aria-valuemax]="maxPreviewWidth()"
          [attr.aria-valuenow]="previewWidth()"
          (pointerdown)="startResize($event)"
          (keydown)="resizeFromKeyboard($event)"
        >
          <span></span>
        </div>
      </div>
    </section>

    <div class="api-playground-viewport__overlay-root"></div>
  </div>
</div>
