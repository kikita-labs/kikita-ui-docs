<div class="docs-shell">
  <app-docs-header
    [landing]="activePage().isLanding"
    [minimal]="activePage().isNotFound"
    [showMenuButton]="!activePage().isLanding && !activePage().isNotFound"
    [menuOpen]="isNavigationOpen()"
    (menuToggle)="toggleNavigation()"
  />

  <div
    class="docs-shell__body"
    [class.docs-shell__body--landing]="activePage().isLanding"
    [class.docs-shell__body--framed]="activePage().isNotFound"
  >
    @if (!activePage().isLanding && !activePage().isNotFound) {
      <button
        class="docs-shell__backdrop"
        type="button"
        aria-label="Close documentation navigation"
        [class.docs-shell__backdrop--open]="isNavigationOpen()"
        (click)="closeNavigation()"
      ></button>

      <aside class="docs-shell__sidebar" [class.docs-shell__sidebar--open]="isNavigationOpen()">
        <div
          id="docs-mobile-navigation"
          [cdkTrapFocus]="isNavigationOpen()"
          [cdkTrapFocusAutoCapture]="isNavigationOpen()"
          [attr.role]="isNavigationOpen() ? 'dialog' : null"
          [attr.aria-modal]="isNavigationOpen() ? 'true' : null"
          [attr.aria-label]="isNavigationOpen() ? 'Documentation navigation' : null"
        >
          <app-sidebar-nav
            (closeNavigation)="closeNavigation()"
            (skipToContent)="focusMainContent()"
          />
        </div>
      </aside>
    }

    <main
      #mainContent
      class="docs-shell__content"
      id="main-content"
      tabindex="-1"
      [attr.inert]="isNavigationOpen() ? '' : null"
    >
      @if (!activePage().isLanding && !activePage().isNotFound) {
        <app-page-toc class="docs-shell__mobile-toc" variant="mobile" />
      }
      <router-outlet />
    </main>

    @if (!activePage().isLanding && !activePage().isNotFound) {
      <app-page-toc class="docs-shell__desktop-toc" [attr.inert]="isNavigationOpen() ? '' : null" />
    }
  </div>
</div>
