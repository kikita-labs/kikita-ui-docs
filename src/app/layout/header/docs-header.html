<header
  class="docs-header"
  [class.docs-header--landing]="landing()"
  [class.docs-header--minimal]="minimal()"
>
  <div class="docs-header__start">
    @if (showMenuButton()) {
      <button
        kuiIconButton
        class="docs-header__menu"
        type="button"
        appearance="ghost"
        size="sm"
        aria-label="Toggle documentation navigation"
        [attr.aria-expanded]="menuOpen()"
        (click)="menuToggle.emit()"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M3 4.5h10M3 8h10M3 11.5h10" />
        </svg>
      </button>
    }

    @if (minimal() || landing()) {
      <a class="docs-header__brand" [routerLink]="homePath" aria-label="Kikita UI Docs home">
        <span class="docs-header__mark" aria-hidden="true">
          <svg viewBox="0 0 16 16" focusable="false">
            <path d="M3 2v12M3 8l7-6M3 8l7 6" />
          </svg>
        </span>
        <span class="docs-header__title">Kikita UI</span>
      </a>

      @if (landing()) {
        <nav class="docs-header__nav" aria-label="Primary documentation">
          <a routerLink="/foundations/installation">Docs</a>
          <a routerLink="/components">Components</a>
          <a routerLink="/smoke">Resources</a>
        </nav>
      }
    } @else {
      <nav class="docs-header__breadcrumbs" aria-label="Breadcrumb">
        @for (breadcrumb of breadcrumbs(); track breadcrumb.label; let last = $last) {
          <span
            [class.docs-header__breadcrumb--current]="last"
            [class.docs-header__breadcrumb--mobile-hidden]="$first && breadcrumbs().length > 1"
            >{{ breadcrumb.label }}</span
          >
          @if (!last) {
            <svg
              viewBox="0 0 12 12"
              aria-hidden="true"
              focusable="false"
              [class.docs-header__breadcrumb--mobile-hidden]="$first && breadcrumbs().length > 1"
            >
              <path d="M4.5 3 7.5 6 4.5 9" />
            </svg>
          }
        }
      </nav>
    }
  </div>

  <div class="docs-header__actions">
    @if (!minimal()) {
      <button
        class="docs-header__search"
        kuiButton
        type="button"
        [appearance]="outlineSecondaryAppearance"
        size="sm"
        (click)="openSearch()"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <circle cx="7" cy="7" r="5" />
          <path d="M11 11 14 14" />
        </svg>
        <span>Search</span>
        <kbd>Ctrl K</kbd>
      </button>
    }

    <app-seed-color-picker />

    <button
      class="docs-header__theme-toggle"
      kuiIconButton
      type="button"
      [appearance]="outlineSecondaryAppearance"
      size="sm"
      [attr.aria-label]="theme.toggleLabel()"
      [attr.aria-pressed]="theme.isDark()"
      (click)="theme.toggle()"
    >
      <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
        @if (theme.isDark()) {
          <path d="M13.5 9.5A6 6 0 1 1 6.5 2.5 4.8 4.8 0 0 0 13.5 9.5z" />
        } @else {
          <circle cx="8" cy="8" r="3" />
          <path
            d="M8 1.5v1.2M8 13.3v1.2M1.5 8h1.2M13.3 8h1.2M3.4 3.4l.9.9M11.7 11.7l.9.9M12.6 3.4l-.9.9M4.3 11.7l-.9.9"
          />
        }
      </svg>
    </button>
  </div>

  <kui-command-palette
    [(open)]="search.open"
    [(query)]="search.query"
    [groups]="searchIndex.groups"
    label="Search documentation"
    placeholder="Search documentation"
    emptyText="No matching docs"
    (selected)="navigateToCommand($event)"
  />
</header>
