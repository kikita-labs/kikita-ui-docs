<nav class="sidebar-nav" aria-label="Documentation sections">
  <a class="sidebar-nav__skip" href="#main-content">Skip to content</a>

  <p class="sidebar-nav__label">Documentation</p>

  <ul class="sidebar-nav__list">
    @for (item of navigationItems; track item.path) {
      <li>
        <a
          class="sidebar-nav__link"
          [routerLink]="item.path"
          routerLinkActive="sidebar-nav__link--active"
          [routerLinkActiveOptions]="activeOptions"
        >
          <span class="sidebar-nav__link-label">{{ item.label }}</span>
          <span class="sidebar-nav__link-description">{{ item.description }}</span>
        </a>
      </li>
    }
  </ul>
</nav>
