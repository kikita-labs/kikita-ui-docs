<button
  [kuiPopoverFor]="themingPopover"
  kuiIconButton
  class="theming__button"
  type="button"
  shape="outline"
  size="sm"
  aria-label="Theming"
>
  <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
    <circle cx="8" cy="8" r="6" />
    <circle cx="6" cy="6.2" r="1.15" />
    <circle cx="10.2" cy="6" r="1" />
    <circle cx="10.6" cy="9.6" r="1" />
    <circle cx="6.6" cy="10.2" r="1" />
  </svg>
</button>

<kui-popover
  #themingPopover
  placement="bottom"
  align="end"
  ariaLabel="Theming"
  [arrow]="true"
  [offset]="10"
>
  <app-seed-colors />

  <hr class="theming__divider" />

  <app-typography />
</kui-popover>
