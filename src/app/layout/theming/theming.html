<button
  [kuiPopoverFor]="themingPopover"
  kuiIconButton
  class="theming__button"
  type="button"
  shape="outline"
  size="sm"
  aria-label="Theming"
>
  <kui-icon name="palette" size="15px" />
</button>

<kui-popover
  #themingPopover
  placement="bottom"
  align="end"
  ariaLabel="Theming"
  [arrow]="true"
  [offset]="10"
>
  <app-seed-colors />

  <hr class="theming__divider" />

  <app-typography />
</kui-popover>
