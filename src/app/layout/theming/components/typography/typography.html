<div class="kui-popover-title">Typography</div>

<div class="typography__group">
  <kui-field>
    <label kuiLabel class="typography__label" for="code-theme-select">Code theme</label>
    <input
      kuiSelect
      id="code-theme-select"
      [value]="theme.codeThemeId()"
      (valueChange)="setCodeThemeId($event)"
      [kuiLabelFn]="codeThemeLabelFn"
      [clearable]="false"
    />
    <kui-dropdown maxHeight="240px">
      @for (option of codeThemeOptions(); track option.id) {
        <div kuiOption [value]="option.id">{{ option.label }}</div>
      }
    </kui-dropdown>
  </kui-field>
</div>

<button kuiButton class="typography__reset" type="button" shape="ghost" size="xs" (click)="reset()">
  <kui-icon name="rotate-ccw" size="15px" />
  Reset to defaults
</button>
