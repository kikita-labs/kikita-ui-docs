<div class="kui-popover-title">Seed tokens</div>

<div class="seed-colors__grid">
  @for (row of rows(); track row.name) {
    <kui-field>
      <label kuiLabel class="seed-colors__label" [attr.for]="'seed-color-' + row.name">
        {{ row.label }}
      </label>
      <input
        kuiColorInput
        class="seed-colors__input"
        [id]="'seed-color-' + row.name"
        size="sm"
        spellcheck="false"
        [value]="row.value"
        [swatchLabel]="row.label + ' seed'"
        (input)="updateSeedColor(row.name, $event)"
      />
    </kui-field>
  }
</div>

<button
  kuiButton
  class="seed-colors__reset"
  type="button"
  shape="ghost"
  size="xs"
  (click)="reset()"
>
  <kui-icon name="rotate-ccw" size="15px" />
  Reset to defaults
</button>
