<article class="density-page">
  <app-page-header
    eyebrow="Foundation"
    heading="Density"
    description="Density controls the spacing feel of Kikita UI primitives without changing their semantic size or interaction model."
  />

  <app-doc-section
    heading="Density values"
    description="The published package exposes a typed KuiDensity union for compact, regular, and comfortable experiences."
  >
    <app-api-table label="Supported density values" [rows]="densityRows" />
  </app-doc-section>

  <app-doc-section
    heading="Global defaults"
    description="Set density through theme seeds. Use provideKikitaUi defaults.size for app-wide control size, not for density."
  >
    <app-code-tabs [tabs]="providerTabs" />
  </app-doc-section>

  <app-doc-section
    heading="Control recommendations"
    description="Height follows the size cascade. Density rebinds horizontal padding and spacing rhythm only."
  >
    <app-api-table label="Recommended control dimensions" [rows]="controlRows" />
  </app-doc-section>

  <app-doc-section
    heading="Component tokens"
    description="Density rebinds the padding tokens below; height tokens resolve from data-kui-size instead."
  >
    <app-code-tabs [tabs]="tokenTabs" />
  </app-doc-section>
</article>
