<article class="field-playground-page">
  <div class="field-playground-page__header">
    <h1>Field &mdash; Playground</h1>
  </div>

  <app-api-playground
    #playground="appApiPlayground"
    previewLabel="Field playground"
    [controls]="playgroundControls"
    [snippet]="buildPlaygroundSnippet"
  >
    <kui-field
      [label]="labelOf(playground.values())"
      [hint]="hintOf(playground.values())"
      [error]="errorOf(playground.values())"
      [size]="sizeOf(playground.values())"
      [required]="requiredOf(playground.values())"
      [hideErrors]="hideErrorsOf(playground.values())"
    >
      <input kuiInput placeholder="mira@company.dev" />
    </kui-field>
  </app-api-playground>

  <app-api-table label="Field API" [rows]="apiRows" />
  <p class="field-playground-page__note">{{ apiDescription }}</p>
</article>
