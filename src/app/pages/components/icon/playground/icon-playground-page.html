<article class="icon-playground-page">
  <div class="icon-playground-page__header">
    <h1>Icon &mdash; Playground</h1>
  </div>

  <app-api-playground
    #playground="appApiPlayground"
    previewLabel="Icon playground"
    [controls]="playgroundControls"
    [snippet]="buildPlaygroundSnippet"
  >
    <kui-icon
      [name]="nameOf(playground.values())"
      [source]="sourceOf(playground.values())"
      [src]="srcOf(playground.values())"
      [size]="sizeOf(playground.values())"
      [label]="labelOf(playground.values())"
    />
  </app-api-playground>

  <app-api-table label="Icon API" [rows]="apiRows" />
  <p class="icon-playground-page__note">{{ apiDescription }}</p>
</article>
