<div class="icon-button-appearance-example">
  <button kuiIconButton type="button" aria-label="Add item">
    <kui-icon [source]="plusIcon" />
  </button>
  <button kuiIconButton type="button" appearance="soft" aria-label="Add item softly">
    <kui-icon [source]="plusIcon" />
  </button>
  <button kuiIconButton type="button" appearance="outline" aria-label="Add item with outline">
    <kui-icon [source]="plusIcon" />
  </button>
  <button kuiIconButton type="button" appearance="ghost" aria-label="Add item quietly">
    <kui-icon [source]="plusIcon" />
  </button>
  <button kuiIconButton type="button" appearance="danger" aria-label="Delete item">
    <kui-icon [source]="trashIcon" />
  </button>
</div>
