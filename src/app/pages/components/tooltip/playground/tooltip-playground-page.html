<article class="tooltip-playground-page">
  <div class="tooltip-playground-page__header">
    <h1>Tooltip &mdash; Playground</h1>
  </div>

  <app-api-playground
    #playground="appApiPlayground"
    previewLabel="Tooltip playground"
    [controls]="playgroundControls"
    [snippet]="buildPlaygroundSnippet"
  >
    <button
      kuiButton
      type="button"
      [kuiTooltip]="textOf(playground.values())"
      [placement]="placementOf(playground.values())"
    >
      Save
    </button>
  </app-api-playground>

  <app-api-table label="Tooltip API" [rows]="apiRows" />
  <p class="tooltip-playground-page__note">{{ apiDescription }}</p>
</article>
