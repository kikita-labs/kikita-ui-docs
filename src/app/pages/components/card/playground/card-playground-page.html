<article class="card-playground-page">
  <div class="card-playground-page__header">
    <h1>Card &mdash; Playground</h1>
  </div>

  <app-api-playground
    #playground="appApiPlayground"
    previewLabel="Card playground"
    [controls]="playgroundControls"
    [snippet]="buildPlaygroundSnippet"
  >
    @if (interactiveOf(playground.values())) {
      <button
        kuiCard
        type="button"
        [appearance]="appearanceOf(playground.values())"
        [size]="sizeOf(playground.values())"
        [interactive]="true"
      >
        <h2>{{ headingOf(playground.values()) }}</h2>
        <p>{{ bodyOf(playground.values()) }}</p>
      </button>
    } @else {
      <article
        kuiCard
        [appearance]="appearanceOf(playground.values())"
        [size]="sizeOf(playground.values())"
      >
        <h2>{{ headingOf(playground.values()) }}</h2>
        <p>{{ bodyOf(playground.values()) }}</p>
      </article>
    }
  </app-api-playground>

  <app-api-table label="Card API" [rows]="apiRows" />
  <p class="card-playground-page__note">{{ apiDescription }}</p>
</article>
