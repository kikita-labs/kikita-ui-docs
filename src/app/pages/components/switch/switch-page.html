<article class="switch-page">
  <app-page-header
    eyebrow="Forms"
    heading="Switch"
    description="Native checkbox rendered as a switch while keeping native keyboard and form behavior."
    [status]="status"
  />

  <app-doc-section
    anchor="import"
    heading="Import"
    description="Use the directive on native checkbox inputs and pair it with kui-field for field-level wiring."
  >
    <app-code-tabs [tabs]="importTabs" />
  </app-doc-section>

  <app-doc-section
    anchor="usage"
    heading="Usage"
    description="Keep native label text next to the switch and reserve switch for binary settings."
  >
    <app-live-preview previewLabel="Basic switch">
      <app-basic-switch-example />
    </app-live-preview>
    <app-code-tabs [tabs]="basicTabs" />
  </app-doc-section>

  <app-doc-section
    anchor="sizes"
    heading="Sizes"
    description="Use the same size scale as other Kikita form controls."
  >
    <app-live-preview previewLabel="Switch sizes">
      <app-switch-size-example />
    </app-live-preview>
    <app-code-tabs [tabs]="sizeTabs" />
  </app-doc-section>

  <app-doc-section anchor="api" heading="API" [description]="apiDescription">
    <app-api-table label="Switch API" [rows]="apiRows" />
  </app-doc-section>

  <app-doc-section
    anchor="accessibility"
    heading="Accessibility"
    description="Switch adds role=switch while keeping the native checkbox element."
  >
    <ul class="switch-page__notes">
      <li>Use a native <code>label</code> for the switch text.</li>
      <li>Use <code>kui-field</code> for group label, hint, error, and described-by wiring.</li>
      <li>Use switch only for immediate binary settings, not multi-choice selection.</li>
      <li>Use native checked and disabled states; do not replace the input with a custom role.</li>
    </ul>
  </app-doc-section>
</article>
