<article class="input-page">
  <app-page-header
    eyebrow="Forms"
    title="Input and Field"
    description="Field wraps native controls with label, hint, error, required state, and ARIA wiring. Input keeps the control native and styles it through kuiInput."
    [status]="status"
  />

  <app-doc-section
    anchor="import"
    title="Import"
    description="Import the public field and input primitives from the package entrypoint."
  >
    <app-code-tabs [tabs]="importTabs" />
  </app-doc-section>

  <app-doc-section
    anchor="usage"
    title="Usage"
    description="Use kui-field as the default wrapper whenever a visible label, hint, error, or required marker is needed."
  >
    <app-live-preview title="Labeled inputs">
      <app-basic-input-example />
    </app-live-preview>
    <app-code-tabs [tabs]="basicTabs" />
  </app-doc-section>

  <app-doc-section
    anchor="input-group"
    title="Input group"
    description="Use .kui-input-group for prefix text, suffix text, decorative icons, or trailing field actions around a native input."
  >
    <app-live-preview title="Affix input">
      <app-input-group-example />
    </app-live-preview>
    <app-code-tabs [tabs]="groupTabs" />
  </app-doc-section>

  <app-doc-section anchor="api" title="API" [description]="apiDescription">
    <div class="input-page__api">
      <app-api-table label="Field API" [rows]="fieldRows" />
      <app-api-table label="Input API" [rows]="inputRows" />
    </div>
  </app-doc-section>

  <app-doc-section
    anchor="accessibility"
    title="Accessibility"
    description="Keep field semantics native-first. Let kui-field wire ids and descriptions instead of duplicating ARIA by hand."
  >
    <ul class="input-page__notes">
      <li>Prefer a visible label through <code>label</code> or projected <code>kuiLabel</code>.</li>
      <li>
        Projected <code>kuiHint</code> and <code>kuiError</code> participate in
        <code>aria-describedby</code>.
      </li>
      <li>Decorative affix icons use <code>aria-hidden="true"</code>.</li>
      <li>Interactive field actions must be native buttons with accessible names.</li>
    </ul>
  </app-doc-section>
</article>
