<article class="input-page">
  <app-page-header
    eyebrow="Forms"
    heading="Input"
    description="Input keeps the control native and applies Kikita UI styling through the kuiInput directive."
    [status]="status"
  />

  <app-doc-section
    heading="Import"
    description="Import the public input primitives from the package entrypoint."
  >
    <app-code-tabs [tabs]="importTabs" />
  </app-doc-section>

  <app-doc-section
    heading="Usage"
    description="Use kuiInput on native input elements. Use Field only when the control needs label, hint, or error chrome."
  >
    <app-playground-route-button docSectionActions />

    <app-live-preview previewLabel="Native inputs">
      <app-basic-input-example />
    </app-live-preview>
    <app-code-tabs [tabs]="basicTabs" />
  </app-doc-section>

  <app-doc-section
    heading="Input group"
    description="Use .kui-input-group for prefix text, suffix text, decorative icons, or trailing field actions around a native input."
  >
    <app-live-preview previewLabel="Affix input">
      <app-input-group-example />
    </app-live-preview>
    <app-code-tabs [tabs]="groupTabs" />
  </app-doc-section>

  <app-doc-section heading="API" [description]="apiDescription">
    <app-api-table label="Input API" [rows]="inputRows" />
  </app-doc-section>

  <app-doc-section
    heading="Accessibility"
    description="Keep native input semantics. Add labels through Field or native label elements."
  >
    <ul class="input-page__notes">
      <li>Use a visible label through <code>kui-field</code> or a native <code>label</code>.</li>
      <li>Use <code>invalid</code> only when the input is outside field error wiring.</li>
      <li>Decorative affix icons use <code>aria-hidden="true"</code>.</li>
      <li>Interactive field actions must be native buttons with accessible names.</li>
    </ul>
  </app-doc-section>
</article>
