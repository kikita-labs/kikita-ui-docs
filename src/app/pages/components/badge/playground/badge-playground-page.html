<article class="badge-playground-page">
  <div class="badge-playground-page__header">
    <h1>Badge &mdash; Playground</h1>
  </div>

  <app-api-playground
    #playground="appApiPlayground"
    previewLabel="Badge playground"
    [controls]="playgroundControls"
    [snippet]="buildPlaygroundSnippet"
  >
    <span
      kuiBadge
      [appearance]="appearanceOf(playground.values())"
      [size]="sizeOf(playground.values())"
    >
      {{ labelOf(playground.values()) }}
    </span>
  </app-api-playground>

  <app-api-table label="Badge API" [rows]="apiRows" />
  <p class="badge-playground-page__note">{{ apiDescription }}</p>
</article>
