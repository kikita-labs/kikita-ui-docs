<article class="docs-not-found-page">
  <div class="docs-not-found-page__content">
    <p class="docs-not-found-page__code">404</p>
    <h1>Page not found</h1>
    <p>
      The page you're looking for doesn't exist or has moved. Try searching, or head back to the
      docs.
    </p>

    <div class="docs-not-found-page__actions">
      <a kuiButton routerLink="/components">Back to Docs</a>
      <button kuiButton type="button" shape="outline" (click)="search.show()">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <circle cx="7" cy="7" r="5" />
          <path d="M11 11 14 14" />
        </svg>
        Search
      </button>
    </div>
  </div>
</article>
