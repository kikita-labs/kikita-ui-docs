<article class="docs-draft-page">
  <app-page-header
    [eyebrow]="draft().eyebrow"
    [title]="draft().title"
    [description]="draft().description"
  />

  <app-doc-section
    title="Section status"
    description="This page is intentionally wired into the docs shell before final content is written."
  >
    <app-draft-state title="Docs coming soon" [description]="draft().description" />
  </app-doc-section>
</article>
